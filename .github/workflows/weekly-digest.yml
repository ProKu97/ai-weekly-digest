name: AI Weekly Digest

on:
  schedule:
    # 每周一 09:10 (北京时间 UTC+8 = UTC 01:10)
    - cron: "10 1 * * 1"
  workflow_dispatch:
    # 支持手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AI Digest Script
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python main.py
